apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagos-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pagos
  template:
    metadata:
      labels:
        app: pagos
    spec:
      containers:
      - name: pagos
        image: pagos-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: pagos-service
spec:
  selector:
    app: pagos
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003