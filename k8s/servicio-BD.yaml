apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-bd-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-bd
  template:
    metadata:
      labels:
        app: servicio-bd
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1

kind: Service
metadata:
  name: servicio-bd
spec:
  selector:
    app: servicio-bd
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
